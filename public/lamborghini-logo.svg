<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Shield background black -->
  <path d="M 100 20 L 170 55 L 170 130 Q 100 195 100 195 Q 100 195 30 130 L 30 55 Z" 
        fill="black" stroke="url(#goldGradient)" stroke-width="5" filter="url(#shadow)"/>
  
  <!-- Inner shine -->
  <path d="M 100 25 L 165 57 L 165 128 Q 100 188 100 188 Q 100 188 35 128 L 35 57 Z" 
        fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.6"/>
  
  <!-- Top text -->
  <text x="100" y="50" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        fill="url(#goldGradient)" text-anchor="middle" letter-spacing="1.5" font-style="italic">
    AUTOMOBILI
  </text>
  <text x="100" y="68" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        fill="url(#goldGradient)" text-anchor="middle" letter-spacing="1.5" font-style="italic">
    LAMBORGHINI
  </text>
  
  <!-- Bull symbol -->
  <g transform="translate(100, 110)">
    <!-- Bull body -->
    <ellipse cx="0" cy="8" rx="16" ry="20" fill="url(#goldGradient)"/>
    
    <!-- Bull head -->
    <circle cx="0" cy="-8" r="14" fill="url(#goldGradient)"/>
    
    <!-- Bull horns left -->
    <path d="M -10 -18 Q -20 -28 -15 -40" stroke="url(#goldGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Bull horns right -->
    <path d="M 10 -18 Q 20 -28 15 -40" stroke="url(#goldGradient)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    
    <!-- Bull eyes -->
    <circle cx="-6" cy="-10" r="2.5" fill="black"/>
    <circle cx="6" cy="-10" r="2.5" fill="black"/>
    
    <!-- Bull nose holes -->
    <circle cx="-4" cy="-2" r="1.5" fill="black"/>
    <circle cx="4" cy="-2" r="1.5" fill="black"/>
    
    <!-- Front leg left -->
    <rect x="-10" y="28" width="3" height="15" fill="url(#goldGradient)" rx="1.5"/>
    
    <!-- Front leg right -->
    <rect x="7" y="28" width="3" height="15" fill="url(#goldGradient)" rx="1.5"/>
    
    <!-- Back positioning (subtle) -->
    <ellipse cx="0" cy="25" rx="8" ry="6" fill="url(#goldGradient)" opacity="0.8"/>
  </g>
</svg>